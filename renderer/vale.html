<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Vale Alimentação</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div id="globalHeader"></div>

  <div class="page-wrap">
    <div class="card">
      <div class="title">Cadastro de Vale Alimentação</div>
      <div class="line">
        <input id="idVale" type="hidden" />
        <label for="dataBaseVale">Data Base</label>
        <input id="dataBaseVale" type="date" />
        <label for="nomeVale">Nome</label>
        <input id="nomeVale" type="text" />
        <label for="valorVale">Valor</label>
        <input id="valorVale" type="text" />
        <label for="diasTrabalhadosVale">Dias Trabalhados</label>
        <input id="diasTrabalhadosVale" type="number" min="0" step="1" />
        <button class="btn" id="btnSalvarVale">Salvar</button>
        <button class="btn" id="btnLimparVale">Limpar</button>
        <button class="btn" id="btnAbrirFaltas">Manter Faltas</button>
      </div>
      <div class="line">
        <span class="status" id="valeStatus">Pronto</span>
      </div>
      <div class="grid-wrapper">
        <div id="valeTable"></div>
      </div>
    </div>

    <div class="card">
      <div class="title">Vínculo Centro de Custo x Vale Alimentação</div>
      <div class="line">
        <label for="ccustoSelect">Centro de Custo</label>
        <select id="ccustoSelect"></select>
        <label for="valeSelect">Vale</label>
        <select id="valeSelect"></select>
        <button class="btn" id="btnSalvarVinculo">Vincular</button>
      </div>
      <div class="line">
        <span class="status" id="vinculoStatus">Pronto</span>
      </div>
      <div class="grid-wrapper">
        <div id="vinculoTable"></div>
      </div>
    </div>

  </div>

  <div id="modalFaltas" class="gmodal" style="display:none;">
    <div class="gmodal__content">
      <div class="gmodal__header">
        <span class="gmodal__title">Manutenção de Faltas</span>
        <button id="btnFecharFaltasTop" class="gmodal__close" type="button" title="Fechar">×</button>
      </div>
      <div class="gmodal__body">
        <div class="line">
          <label for="funcionarioFaltaSelect">Funcionário</label>
          <select id="funcionarioFaltaSelect"></select>
          <label for="faltasModalInput">Faltas</label>
          <input id="faltasModalInput" type="number" min="0" step="1" />
          <button class="btn" id="btnSalvarFalta">Salvar</button>
          <button class="btn" id="btnLimparFalta">Limpar</button>
        </div>
        <div class="line">
          <span class="status" id="faltasStatus">Pronto</span>
        </div>
        <div class="grid-wrapper">
          <div id="faltasTable"></div>
        </div>
      </div>
      <div class="gmodal__footer">
        <button class="btn" id="btnFecharFaltasBottom" type="button">Fechar</button>
      </div>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/vale.js"></script>
</body>
</html>
