<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Funcionários (XLSX)</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div id="globalHeader"></div>
 
  <div class="page-wrap">
    <div class="card">
      <div class="title">Importação</div>

      <div class="line">
        <button class="btn" id="btnPickXlsx">Selecionar XLSX</button>
        <input id="xlsxPath" type="text" readonly />
      </div>

      <div class="line">
        <label class="muted" for="dismissMonths">Demitidos – últimos (X) meses</label>
        <select id="dismissMonths" title="Selecione a regra para demitidos">
          <option value="" selected>Selecione...</option>
          <option value="todos">Todos</option>
          <option value="nenhum">Nenhum</option>
          <option value="mes_atual">Mês Atual</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
        </select>

        
      </div>
      <div class="line">
        <button class="btn" id="btnImportXlsx">Importar</button>
      </div>

      <div class="line">
        <progress id="empProg" max="100" value="0"></progress>
        <span class="status" id="empStatus">Pronto</span>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="title">Prévia (funcionário)</div>
      <div class="line">
        <label for="empSortBy">Ordenar por</label>
        <select id="empSortBy">
          <option value="nome">Nome</option>
          <option value="admissao">Data Admissão</option>
        </select>
      </div>
      <div class="grid-wrapper">
        <div id="empTable"></div>
      </div>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/employees.js"></script>
</body>
</html>
