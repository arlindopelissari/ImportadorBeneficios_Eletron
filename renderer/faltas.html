<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Manter Faltas</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body> 
  <div class="page-wrap">
    <div class="card">
      <div class="title">Manutenção de Faltas</div>
      <div class="line line--faltas-controls">
        <label for="funcionarioFaltaSelect">Funcionário</label>
        <select id="funcionarioFaltaSelect"></select>
        <label for="faltasInput">Faltas</label>
        <input id="faltasInput" type="number" min="0" step="1" />
        <button class="btn" id="btnSalvarFalta">Salvar</button>
        <button class="btn" id="btnLimparFalta">Limpar</button>
        <button class="btn" id="btnExcluirTodasFaltas">Excluir todas</button>
        <button class="btn" id="btnAtualizarFaltas">Atualizar</button>
      </div>
      <div class="line">
        <span class="status" id="faltasStatus">Pronto</span>
      </div>
      <div class="grid-wrapper">
        <div id="faltasTable"></div>
      </div>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/faltas.js"></script>
</body>
</html>
